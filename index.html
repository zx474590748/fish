<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FISH - 世界聊天室</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans SC', sans-serif; }
    body { background: linear-gradient(135deg, #f0fdfa, #fef3c7); min-height: 100vh; color: #1e293b; }
    .card { background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; padding: 24px; }
    .btn-primary { background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 12px 24px; border-radius: 12px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; display: inline-block; text-align: center; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16,185,129,0.4); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .input-field { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px; background: #f8fafc; outline: none; transition: all 0.2s; box-sizing: border-box; }
    .input-field:focus { border-color: #10b981; box-shadow: 0 0 0 4px rgba(16,185,129,0.1); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 50; }
    .hidden { display: none !important; }
    .message-self { background: linear-gradient(135deg, #10b981, #059669); color: white; border-radius: 18px 18px 4px 18px; padding: 10px 14px; display: inline-block; max-width: 70%; word-wrap: break-word; }
    .message-other { background: #f1f5f9; border-radius: 18px 18px 18px 4px; padding: 10px 14px; display: inline-block; max-width: 70%; word-wrap: break-word; }
    .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .room-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
    .room-item:hover { background: #f1f5f9; }
    .room-item.active { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
    .emoji-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 6px; font-size: 18px; }
    .emoji-btn:hover { background: #f1f5f9; }
  </style>
</head>
<body>

<!-- 登录/注册界面 -->
<div id="authModal" class="modal-overlay">
  <div class="card w-full max-w-sm mx-4 text-center">
    <div class="text-4xl mb-2">🐟</div>
    <h1 class="text-2xl font-bold text-emerald-600 mb-6">FISH 聊天室</h1>
    
    <div id="loginBox">
      <input id="loginUser" class="input-field mb-3" placeholder="用户名 (英文+数字)">
      <input id="loginPass" type="password" class="input-field mb-4" placeholder="密码">
      <button onclick="handleLogin()" id="loginBtn" class="btn-primary w-full">登录</button>
      <p class="mt-4 text-sm text-slate-500">没有账号？<button onclick="showRegister()" class="text-emerald-600 font-semibold">注册</button></p>
    </div>

    <div id="regBox" class="hidden">
      <input id="regUser" class="input-field mb-3" placeholder="用户名 (3-16位英文数字)">
      <input id="regPass" type="password" class="input-field mb-4" placeholder="密码 (4-20位)">
      <button onclick="handleRegister()" id="regBtn" class="btn-primary w-full">注册</button>
      <p class="mt-4 text-sm text-slate-500">已有账号？<button onclick="showLogin()" class="text-emerald-600 font-semibold">登录</button></p>
    </div>
  </div>
</div>

<!-- 主界面 -->
<div id="mainApp" class="hidden h-screen flex flex-col">
  <header class="card mx-4 mt-4 px-6 py-3 flex justify-between items-center">
    <h1 class="text-xl font-bold text-emerald-600">🐟 FISH</h1>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2 text-sm text-slate-600">
        <span class="online-dot"></span>
        <span id="onlineNum">--</span> 在线
      </div>
      <button onclick="openProfile()" id="headerUser" class="font-semibold text-slate-700 hover:text-emerald-600"></button>
    </div>
  </header>

  <div class="flex-1 flex gap-4 p-4 overflow-hidden">
    <!-- 左侧房间 -->
    <aside class="card w-64 flex-shrink-0 overflow-y-auto hidden md:block">
      <div class="p-4 border-b font-semibold">聊天室</div>
      <div id="roomList" class="p-2 space-y-1"></div>
    </aside>

    <!-- 聊天区 -->
    <main class="card flex-1 flex flex-col overflow-hidden">
      <div class="px-6 py-4 border-b">
        <h2 id="roomTitle" class="font-semibold">世界聊天室</h2>
        <p id="roomDesc" class="text-xs text-slate-500">和全世界畅聊</p>
      </div>
      <div id="msgList" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
      <div class="p-4 border-t flex gap-2">
        <div class="relative">
          <button onclick="toggleEmoji()" class="p-2 hover:bg-slate-100 rounded-lg text-xl">😊</button>
          <div id="emojiBox" class="hidden absolute bottom-12 left-0 card p-2 w-64 h-48 overflow-y-auto emoji-grid z-10"></div>
        </div>
        <input id="msgInput" class="input-field flex-1" placeholder="输入消息..." onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()" class="btn-primary">发送</button>
      </div>
    </main>
  </div>
</div>

<!-- 个人中心 -->
<div id="profileModal" class="modal-overlay hidden">
  <div class="card w-80">
    <div class="flex justify-between mb-4">
      <h3 class="font-semibold text-lg">个人中心</h3>
      <button onclick="closeProfile()" class="text-slate-400 hover:text-slate-600 text-xl">&times;</button>
    </div>
    <div class="text-center mb-4">
      <div id="profileAvatar" class="w-16 h-16 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center text-white text-2xl font-bold mx-auto mb-2"></div>
      <div id="profileName" class="font-semibold"></div>
    </div>
    <div class="bg-emerald-50 rounded-xl p-4 mb-4 text-sm grid grid-cols-3 text-center">
      <div><div id="pWords" class="font-bold text-emerald-600">0</div><div class="text-slate-500">字数</div></div>
      <div><div id="pTime" class="font-bold text-pink-500">0</div><div class="text-slate-500">分钟</div></div>
      <div><div id="pDays" class="font-bold text-amber-500">0</div><div class="text-slate-500">签到</div></div>
    </div>
    <button onclick="logout()" class="w-full py-2 text-red-500 hover:bg-red-50 rounded-lg">退出登录</button>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 card px-6 py-3 z-50 border-l-4 border-red-400 hidden"></div>

<script>
// ======================================================
// 【第一步】在这里填写你的 Supabase 信息
// ======================================================
const SUPABASE_URL = 'https://xgsmfikhstlxingnzcdf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhnc21maWtoc3RseGluZ256Y2RmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTI4NzYsImV4cCI6MjA4ODI2ODg3Nn0.gghyf7F7Wqspd3GzkSQb1DCY_yW5Vq8lmiIWDnR9TPE';

// 初始化 Supabase (这里只定义一次，不要改动)
const { createClient } = window.supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// ======================================================
// 变量定义
// ======================================================
let currentUser = null;
let currentRoom = 'world';
let joinedRooms = ['world'];
let totalWords = 0;
let onlineTime = 0;
let checkinDays = [];
let channel = null;

const rooms = [
  { id: 'world', name: '世界聊天', desc: '和全世界畅聊' },
  { id: 'game', name: '游戏世界', desc: '组队开黑' },
  { id: 'ai', name: 'AI前沿', desc: '探讨AI' },
  { id: 'food', name: '美食天地', desc: '吃货天堂' }
];

const emojis = ['😀','😃','😄','😁','😅','😂','🤣','😊','😇','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😜','🤪','😝','🤑','🤗','🤭','🤫','🤔','🤐','🤨','😐','😑','😶','😏','😒','🙄','😬','🤥','😔','😪','🤤','😴','😷','🤒','🤕','🤢','🤮','🤧','🥵','🥶','🥴','😵','🤯','🤠','🥳','😎','🤓','🧐','👍','👎','👏','🙌','❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❣️','💕','💞','💓','💗','💖','💘','💝'];

// ======================================================
// 初始化
// ======================================================
async function init() {
  const saved = localStorage.getItem('fish_user');
  if (saved) {
    const user = JSON.parse(saved);
    const { data } = await db.from('users').select('*').eq('id', user.id).single();
    if (data) {
      currentUser = data;
      joinedRooms = data.joined_rooms || ['world'];
      totalWords = data.total_words || 0;
      onlineTime = data.online_time || 0;
      checkinDays = data.checkin_days || [];
      showMain();
      return;
    }
  }
  document.getElementById('authModal').classList.remove('hidden');
}

// ======================================================
// 登录注册
// ======================================================
function showRegister() { document.getElementById('loginBox').classList.add('hidden'); document.getElementById('regBox').classList.remove('hidden'); }
function showLogin() { document.getElementById('loginBox').classList.remove('hidden'); document.getElementById('regBox').classList.add('hidden'); }

async function handleLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!username || !password) return toast('请填写完整');
  if (!/^[a-zA-Z0-9]+$/.test(username)) return toast('用户名只能是英文数字');

  setBtn('loginBtn', true);
  const { data } = await db.from('users').select('*').eq('username', username).eq('password', password).single();
  setBtn('loginBtn', false);

  if (data) {
    currentUser = data;
    joinedRooms = data.joined_rooms || ['world'];
    totalWords = data.total_words || 0;
    onlineTime = data.online_time || 0;
    checkinDays = data.checkin_days || [];
    localStorage.setItem('fish_user', JSON.stringify(currentUser));
    showMain();
  } else toast('用户名或密码错误');
}

async function handleRegister() {
  const username = document.getElementById('regUser').value.trim();
  const password = document.getElementById('regPass').value;
  if (!username || !password) return toast('请填写完整');
  if (username.length < 3 || username.length > 16) return toast('用户名3-16位');
  if (password.length < 4 || password.length > 20) return toast('密码4-20位');
  if (!/^[a-zA-Z0-9]+$/.test(username) || !/^[a-zA-Z0-9]+$/.test(password)) return toast('只能英文数字');

  setBtn('regBtn', true);
  const { data: exist } = await db.from('users').select('username').eq('username', username).single();
  if (exist) { setBtn('regBtn', false); return toast('用户名已存在'); }

  const { data } = await db.from('users').insert({ username, password, joined_rooms: ['world'] }).select().single();
  setBtn('regBtn', false);

  if (data) {
    currentUser = data;
    localStorage.setItem('fish_user', JSON.stringify(currentUser));
    showMain();
  } else toast('注册失败');
}

function setBtn(id, loading) {
  const btn = document.getElementById(id);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>' : (id === 'loginBtn' ? '登录' : '注册');
}

async function logout() {
  await db.from('users').update({ total_words: totalWords, online_time: onlineTime, checkin_days: checkinDays }).eq('id', currentUser.id);
  localStorage.removeItem('fish_user');
  location.reload();
}

// ======================================================
// 主界面
// ======================================================
function showMain() {
  document.getElementById('authModal').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('headerUser').textContent = currentUser.username;
  renderRooms();
  switchRoom(currentRoom);
  startTimer();
  updateOnline();
}

function renderRooms() {
  document.getElementById('roomList').innerHTML = rooms.map(r => `
    <div class="room-item ${currentRoom === r.id ? 'active' : ''}" onclick="switchRoom('${r.id}')">
      <div class="font-medium text-sm">${r.name}</div>
    </div>
  `).join('');
}

async function switchRoom(id) {
  currentRoom = id;
  const room = rooms.find(r => r.id === id);
  document.getElementById('roomTitle').textContent = room.name;
  document.getElementById('roomDesc').textContent = room.desc;
  renderRooms();
  await loadMsgs();
  subMsgs();
}

async function loadMsgs() {
  const { data } = await db.from('messages').select('*').eq('room_id', currentRoom).order('created_at', { ascending: true }).limit(100);
  const list = document.getElementById('msgList');
  list.innerHTML = '';
  if (data?.length) data.forEach(m => addMsg(m, false));
  else list.innerHTML = '<p class="text-center text-slate-400 py-8">暂无消息</p>';
  list.scrollTop = list.scrollHeight;
}

function subMsgs() {
  if (channel) db.removeChannel(channel);
  channel = db.channel('m_' + currentRoom)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${currentRoom}` }, p => addMsg(p.new, true))
    .subscribe();
}

function addMsg(m, scroll = true) {
  const list = document.getElementById('msgList');
  if (list.querySelector('p')) list.innerHTML = '';
  const self = m.username === currentUser?.username;
  const time = new Date(m.created_at).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  const div = document.createElement('div');
  div.className = `flex gap-3 ${self ? 'justify-end' : ''}`;
  div.innerHTML = `
    <div class="w-10 h-10 rounded-full ${self ? 'bg-gradient-to-br from-emerald-400 to-teal-500' : 'bg-gradient-to-br from-pink-400 to-purple-500'} flex items-center justify-center text-white font-bold flex-shrink-0">${m.username[0].toUpperCase()}</div>
    <div class="${self ? 'text-right' : ''}">
      <div class="flex items-center gap-2 text-xs text-slate-400 mb-1 ${self ? 'justify-end' : ''}">${m.username} ${time}</div>
      <div class="${self ? 'message-self' : 'message-other'}">${m.content.replace(/</g,'&lt;')}</div>
    </div>`;
  list.appendChild(div);
  if (scroll) list.scrollTop = list.scrollHeight;
}

async function send() {
  const content = document.getElementById('msgInput').value.trim();
  if (!content) return;
  document.getElementById('msgInput').value = '';
  totalWords += content.length;
  await db.from('messages').insert({ room_id: currentRoom, user_id: currentUser.id, username: currentUser.username, content });
}

function startTimer() {
  setInterval(() => {
    onlineTime++;
    if (onlineTime % 5 === 0) db.from('users').update({ online_time: onlineTime }).eq('id', currentUser.id);
  }, 60000);
}

async function updateOnline() {
  const { count } = await db.from('users').select('*', { count: 'exact', head: true });
  document.getElementById('onlineNum').textContent = count || 0;
  setTimeout(updateOnline, 30000);
}

function openProfile() {
  document.getElementById('profileModal').classList.remove('hidden');
  document.getElementById('profileAvatar').textContent = currentUser.username[0].toUpperCase();
  document.getElementById('profileName').textContent = currentUser.username;
  document.getElementById('pWords').textContent = totalWords;
  document.getElementById('pTime').textContent = onlineTime;
  let c = 0;
  for (let i = 0; i < 30; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    if (checkinDays.includes(d.toDateString())) c++;
    else break;
  }
  document.getElementById('pDays').textContent = c;
}

function closeProfile() { document.getElementById('profileModal').classList.add('hidden'); }

// ======================================================
// 表情
// ======================================================
function toggleEmoji() {
  const box = document.getElementById('emojiBox');
  box.classList.toggle('hidden');
  if (!box.classList.contains('hidden')) {
    box.innerHTML = emojis.map(e => `<div class="emoji-btn" onclick="addEmoji('${e}')">${e}</div>`).join('');
  }
}
function addEmoji(e) {
  document.getElementById('msgInput').value += e;
  document.getElementById('msgInput').focus();
}
document.addEventListener('click', ev => {
  if (!ev.target.closest('#emojiBox') && !ev.target.closest('button')) document.getElementById('emojiBox').classList.add('hidden');
});

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 3000);
}

// 启动
init();
</script>
</body>
</html>
