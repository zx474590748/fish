<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FISH - 世界聊天室</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-start: #f0fdfa;
      --bg-end: #fef3c7;
      --fg: #1e293b;
      --muted: #64748b;
      --accent: #10b981;
      --accent-light: #d1fae5;
      --secondary: #f472b6;
      --card: #ffffff;
      --border: #e2e8f0;
    }
    * { font-family: 'Noto Sans SC', 'Quicksand', sans-serif; }
    body { background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%); min-height: 100vh; color: var(--fg); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #059669); color: white; border-radius: 12px; font-weight: 600; transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(16,185,129,0.3); border: none; cursor: pointer; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16,185,129,0.4); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-secondary { background: var(--accent-light); color: var(--accent); border-radius: 12px; font-weight: 600; transition: all 0.2s ease; border: none; cursor: pointer; }
    .btn-secondary:hover { background: #a7f3d0; }
    .input-field { background: #f8fafc; border: 2px solid var(--border); border-radius: 12px; transition: all 0.2s ease; width: 100%; box-sizing: border-box; }
    .input-field:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-light); }
    .room-tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; transition: all 0.2s ease; cursor: pointer; }
    .room-tag.active { background: var(--accent); color: white; box-shadow: 0 2px 8px rgba(16,185,129,0.3); }
    .room-tag:not(.active) { background: var(--accent-light); color: var(--accent); }
    .message { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .message-self { background: linear-gradient(135deg, var(--accent), #059669); color: white; border-radius: 18px 18px 4px 18px; }
    .message-other { background: #f1f5f9; color: var(--fg); border-radius: 18px 18px 18px 4px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .modal-overlay { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
    .modal-content { animation: modalIn 0.3s ease; }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .checkin-day { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; transition: all 0.2s ease; }
    .checkin-day.checked { background: linear-gradient(135deg, var(--accent), #059669); color: white; }
    .checkin-day.today { border: 2px solid var(--secondary); }
    .online-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .room-type-card { border: 2px solid var(--border); border-radius: 16px; padding: 16px; cursor: pointer; transition: all 0.2s ease; }
    .room-type-card:hover { border-color: var(--accent); background: var(--accent-light); }
    .room-type-card.selected { border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 4px rgba(16,185,129,0.2); }
    .stat-number { font-family: 'Quicksand', sans-serif; font-weight: 700; }
    .room-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 14px; cursor: pointer; transition: all 0.2s ease; position: relative; }
    .room-item.joined { background: linear-gradient(135deg, #ecfdf5, #d1fae5); border: 1.5px solid #a7f3d0; }
    .room-item.joined:hover { background: linear-gradient(135deg, #d1fae5, #a7f3d0); }
    .room-item.joined.active { background: linear-gradient(135deg, #10b981, #059669); border-color: transparent; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
    .room-item.joined.active .room-name, .room-item.joined.active .room-online { color: white; }
    .room-item:not(.joined) { background: #f8fafc; border: 1.5px dashed #e2e8f0; }
    .room-item:not(.joined):hover { background: #fef3c7; border-color: #fcd34d; }
    .room-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .room-info { flex: 1; min-width: 0; }
    .room-actions { display: flex; align-items: center; gap: 4px; }
    .exit-btn { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: rgba(239,68,68,0.1); color: #ef4444; transition: all 0.2s ease; cursor: pointer; flex-shrink: 0; border: none; }
    .exit-btn:hover { background: rgba(239,68,68,0.2); transform: scale(1.1); }
    .join-badge { font-size: 10px; padding: 3px 8px; border-radius: 8px; font-weight: 600; flex-shrink: 0; }
    .world-badge { font-size: 9px; padding: 2px 6px; border-radius: 6px; font-weight: 600; background: linear-gradient(135deg, #fbbf24, #f59e0b); color: white; flex-shrink: 0; }
    .achievement-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .achievement-1 { background: linear-gradient(135deg, #e0f2fe, #bae6fd); color: #0369a1; }
    .achievement-2 { background: linear-gradient(135deg, #dcfce7, #bbf7d0); color: #15803d; }
    .achievement-3 { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #b45309; }
    .achievement-4 { background: linear-gradient(135deg, #fce7f3, #fbcfe8); color: #be185d; }
    .achievement-5 { background: linear-gradient(135deg, #e0e7ff, #c7d2fe); color: #4338ca; }
    .news-badge { font-size: 9px; padding: 2px 6px; border-radius: 6px; font-weight: 600; background: linear-gradient(135deg, #818cf8, #6366f1); color: white; flex-shrink: 0; cursor: pointer; transition: all 0.2s ease; border: none; }
    .news-badge:hover { transform: scale(1.05); box-shadow: 0 2px 8px rgba(99,102,241,0.4); }
    .news-card { padding: 12px 14px; border-radius: 10px; background: linear-gradient(135deg, #fafafa, #f5f5f5); border: 1px solid #e5e5e5; transition: all 0.2s ease; cursor: pointer; margin-bottom: 8px; }
    .news-card:hover { background: linear-gradient(135deg, #f5f5f5, #eeeeee); transform: translateX(4px); }
    .news-preview-list { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .news-preview-list.expanded { max-height: 300px; }
    .emoji-picker { position: absolute; bottom: 100%; left: 0; margin-bottom: 8px; background: white; border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); width: 280px; z-index: 100; animation: emojiPickerIn 0.2s ease; transform-origin: bottom left; }
    @keyframes emojiPickerIn { from { opacity: 0; transform: scale(0.9) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .emoji-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .emoji-item { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 18px; border-radius: 8px; cursor: pointer; }
    .emoji-item:hover { background: #f1f5f9; transform: scale(1.15); }
    .member-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    /* 头像背景色 */
    .avatar-world-1 { background: linear-gradient(135deg, #f472b6, #ec4899); }
    .avatar-world-2 { background: linear-gradient(135deg, #a78bfa, #8b5cf6); }
    .avatar-world-3 { background: linear-gradient(135deg, #60a5fa, #3b82f6); }
    .avatar-pet-1 { background: linear-gradient(135deg, #fda4af, #fb7185); }
    .avatar-pet-2 { background: linear-gradient(135deg, #fdba74, #fb923c); }
    .avatar-game-1 { background: linear-gradient(135deg, #e879f9, #d946ef); }
    .avatar-travel-1 { background: linear-gradient(135deg, #67e8f9, #22d3ee); }
    .avatar-car-1 { background: linear-gradient(135deg, #94a3b8, #64748b); }
    .avatar-ai-1 { background: linear-gradient(135deg, #818cf8, #6366f1); }
    .avatar-food-1 { background: linear-gradient(135deg, #fdba74, #fb923c); }
    .member-item { animation: memberFadeIn 0.3s ease forwards; opacity: 0; }
    @keyframes memberFadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    .rank-crown { position: absolute; top: -6px; left: -6px; font-size: 16px; }
    .loading-spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 768px) { .sidebar { position: fixed; left: -100%; top: 0; height: 100vh; z-index: 50; transition: left 0.3s ease; } .sidebar.open { left: 0; } }
  </style>
</head>
<body class="overflow-hidden">
  <!-- 背景装饰 -->
  <div class="fixed inset-0 pointer-events-none z-0">
    <div class="absolute rounded-full w-80 h-80 top-[-100px] right-[-100px] bg-gradient-to-br from-emerald-100 to-pink-100 opacity-30" style="border-radius: 50%;"></div>
    <div class="absolute rounded-full w-60 h-60 bottom-10 left-[-50px] bg-gradient-to-br from-blue-100 to-purple-100 opacity-30"></div>
  </div>

  <!-- 登录/注册模态框 -->
  <div id="authModal" class="fixed inset-0 z-50 flex items-center justify-center modal-overlay">
    <div class="modal-content card p-8 w-full max-w-md mx-4 relative">
      <div class="text-center mb-8">
        <div class="inline-flex items-center gap-2 mb-2">
          <svg class="w-10 h-10 text-emerald-500" viewBox="0 0 40 40" fill="none"><ellipse cx="16" cy="20" rx="12" ry="8" fill="currentColor"/><path d="M28 20 L38 14 L38 26 Z" fill="currentColor"/><circle cx="12" cy="18" r="2" fill="white"/></svg>
          <span class="text-3xl font-bold text-emerald-600">FISH</span>
        </div>
        <p class="text-slate-500">游进世界聊天室，畅聊无限可能</p>
      </div>

      <div id="loginForm">
        <div class="space-y-4">
          <div><label class="block text-sm font-medium text-slate-600 mb-2">用户名 <span class="text-slate-400">(英文+数字)</span></label><input type="text" id="loginUsername" class="input-field px-4 py-3" placeholder="例如: fish123"></div>
          <div><label class="block text-sm font-medium text-slate-600 mb-2">密码 <span class="text-slate-400">(英文+数字)</span></label><input type="password" id="loginPassword" class="input-field px-4 py-3" placeholder="输入密码"></div>
        </div>
        <button onclick="handleLogin()" id="loginBtn" class="btn-primary w-full py-3 mt-6 flex justify-center">登录</button>
        <p class="text-center text-slate-500 text-sm mt-4">还没有账号？<button onclick="showRegister()" class="text-emerald-600 font-semibold hover:underline">立即注册</button></p>
      </div>

      <div id="registerForm" class="hidden">
        <div class="space-y-4">
          <div><label class="block text-sm font-medium text-slate-600 mb-2">用户名 <span class="text-slate-400">(3-16位英文数字)</span></label><input type="text" id="regUsername" class="input-field px-4 py-3" placeholder="例如: player2024"></div>
          <div><label class="block text-sm font-medium text-slate-600 mb-2">密码 <span class="text-slate-400">(4-20位英文数字)</span></label><input type="password" id="regPassword" class="input-field px-4 py-3" placeholder="设置密码"></div>
          <div>
            <label class="block text-sm font-medium text-slate-600 mb-2">选择感兴趣的聊天室（可选，最多3个）</label>
            <div class="grid grid-cols-2 gap-3" id="roomTypeSelector">
              <div class="room-type-card" data-id="pet" onclick="toggleRoomType(this)"><span class="text-xl mb-1 block">🐾</span><span class="font-medium">宠物</span></div>
              <div class="room-type-card" data-id="travel" onclick="toggleRoomType(this)"><span class="text-xl mb-1 block">🏔️</span><span class="font-medium">景点</span></div>
              <div class="room-type-card" data-id="game" onclick="toggleRoomType(this)"><span class="text-xl mb-1 block">🎮</span><span class="font-medium">游戏</span></div>
              <div class="room-type-card" data-id="car" onclick="toggleRoomType(this)"><span class="text-xl mb-1 block">🚗</span><span class="font-medium">汽车</span></div>
              <div class="room-type-card" data-id="ai" onclick="toggleRoomType(this)"><span class="text-xl mb-1 block">🤖</span><span class="font-medium">AI</span></div>
              <div class="room-type-card" data-id="food" onclick="toggleRoomType(this)"><span class="text-xl mb-1 block">🍜</span><span class="font-medium">美食</span></div>
            </div>
          </div>
        </div>
        <button onclick="handleRegister()" id="registerBtn" class="btn-primary w-full py-3 mt-6 flex justify-center">注册</button>
        <p class="text-center text-slate-500 text-sm mt-4">已有账号？<button onclick="showLogin()" class="text-emerald-600 font-semibold hover:underline">返回登录</button></p>
      </div>
    </div>
  </div>

  <!-- 主界面 -->
  <div id="mainApp" class="hidden h-screen flex flex-col relative z-10">
    <header class="card mx-4 mt-4 px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button onclick="document.getElementById('sidebar').classList.toggle('open')" class="md:hidden p-2 hover:bg-slate-100 rounded-lg">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="flex items-center gap-2">
          <svg class="w-8 h-8 text-emerald-500" viewBox="0 0 40 40" fill="none"><ellipse cx="16" cy="20" rx="12" ry="8" fill="currentColor"/><path d="M28 20 L38 14 L38 26 Z" fill="currentColor"/><circle cx="12" cy="18" r="2" fill="white"/></svg>
          <span class="text-2xl font-bold text-emerald-600">FISH</span>
        </div>
      </div>
      <div class="hidden md:flex items-center gap-2 overflow-x-auto" id="roomTags"></div>
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2"><div class="online-dot"></div><span id="onlineCount" class="text-sm font-medium text-slate-600">-- 在线</span></div>
        <button onclick="openProfile()" class="flex items-center gap-2 px-3 py-2 rounded-xl hover:bg-slate-50 transition">
          <div id="userAvatar" class="w-9 h-9 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center text-white font-bold"></div>
          <span id="userName" class="font-medium text-slate-700 hidden sm:block"></span>
        </button>
      </div>
    </header>

    <div class="flex-1 flex gap-4 p-4 overflow-hidden">
      <aside id="sidebar" class="sidebar card w-72 flex-shrink-0 flex flex-col overflow-hidden">
        <div class="p-4 border-b border-slate-100">
          <div class="flex items-center justify-between">
            <h3 class="font-semibold text-slate-800">聊天室排行</h3>
            <span class="text-xs px-2 py-1 bg-emerald-100 text-emerald-700 rounded-full font-medium">已加入 <span id="joinedCount">0</span>/3</span>
          </div>
          <p class="text-xs text-slate-500 mt-2">按摸鱼成就等级排序</p>
        </div>
        <div class="flex-1 overflow-y-auto p-3" id="allRoomsList"></div>
      </aside>

      <main class="card flex-1 flex flex-col overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div id="currentRoomIcon" class="room-icon bg-emerald-100"><span class="text-xl">🌐</span></div>
            <div><h2 id="currentRoomName" class="font-semibold text-slate-800">世界聊天室</h2><p id="currentRoomDesc" class="text-xs text-slate-500">和全世界的人一起畅聊</p></div>
          </div>
          <button onclick="toggleMemberList()" class="p-2 hover:bg-slate-50 rounded-lg md:hidden">
            <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          </button>
        </div>
        <div id="messageList" class="flex-1 overflow-y-auto px-6 py-4 space-y-4"></div>
        <div class="px-6 py-4 border-t border-slate-100">
          <div class="flex items-end gap-2">
            <div class="relative">
              <button onclick="toggleEmojiPicker()" class="emoji-btn" title="发送表情">😊</button>
              <div id="emojiPicker" class="emoji-picker hidden">
                <div class="p-3 max-h-48 overflow-y-auto"><div class="emoji-grid" id="emojiGrid"></div></div>
              </div>
            </div>
            <div class="flex-1"><textarea id="messageInput" class="input-field px-4 py-3 resize-none" placeholder="说点什么..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea></div>
            <button onclick="sendMessage()" id="sendBtn" class="btn-primary px-5 py-3 flex items-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
              <span class="hidden sm:inline">发送</span>
            </button>
          </div>
        </div>
      </main>

      <aside id="memberList" class="card w-64 flex-shrink-0 overflow-hidden hidden md:flex flex-col">
        <div class="p-4 border-b border-slate-100 bg-gradient-to-br from-emerald-50 to-teal-50">
          <div class="flex items-center gap-2 mb-3"><span class="text-lg">🐟</span><h3 class="font-semibold text-slate-800">摸鱼统计</h3></div>
          <div class="space-y-2">
            <div class="flex justify-between items-center"><span class="text-xs text-slate-500">摸鱼人数</span><span id="statFishers" class="font-bold text-emerald-600">--</span></div>
            <div class="flex justify-between items-center"><span class="text-xs text-slate-500">累计时间</span><span id="statTotalTime" class="font-bold text-emerald-600">-- 分钟</span></div>
            <div class="pt-2 border-t border-emerald-100">
              <div class="flex justify-between items-center mb-1"><span class="text-xs text-slate-500">摸鱼成就</span></div>
              <div id="achievementBadge" class="achievement-badge achievement-1"><span id="achievementIcon">🐠</span><span id="achievementName">小鱼</span></div>
              <div class="mt-2">
                <div class="flex justify-between text-xs text-slate-400 mb-1"><span>下一等级进度</span><span id="progressText">--</span></div>
                <div class="h-2 bg-white rounded-full overflow-hidden"><div id="progressBar" class="h-full bg-gradient-to-r from-emerald-400 to-teal-500 transition-all duration-500" style="width: 0%"></div></div>
              </div>
            </div>
          </div>
        </div>
        <div class="p-4 border-b border-slate-100 flex items-center justify-between"><h3 class="font-semibold text-slate-800">活跃成员</h3><span id="memberCount" class="text-xs px-2 py-1 bg-emerald-100 text-emerald-700 rounded-full font-medium">--人</span></div>
        <div class="flex-1 overflow-y-auto p-3 space-y-2" id="memberListContent"></div>
      </aside>
    </div>
  </div>

  <!-- 资讯详情模态框 -->
  <div id="newsModal" class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay">
    <div class="modal-content card p-6 w-full max-w-2xl mx-4 max-h-[85vh] overflow-hidden flex flex-col">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3"><div id="newsModalIcon" class="w-10 h-10 rounded-xl bg-indigo-100 flex items-center justify-center"><span class="text-xl">📰</span></div><div><h3 id="newsModalTitle" class="text-lg font-semibold text-slate-800">每日资讯</h3><p id="newsModalSubtitle" class="text-xs text-slate-500">今日热点一览</p></div></div>
        <button onclick="closeNewsModal()" class="p-2 hover:bg-slate-100 rounded-lg"><svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <div class="flex-1 overflow-y-auto space-y-3 pr-2" id="newsModalContent"></div>
    </div>
  </div>

  <!-- 个人中心模态框 -->
  <div id="profileModal" class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay">
    <div class="modal-content card p-6 w-full max-w-md mx-4 max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-6"><h3 class="text-lg font-semibold text-slate-800">个人中心</h3><button onclick="closeProfile()" class="p-2 hover:bg-slate-100 rounded-lg"><svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button></div>
      <div class="text-center mb-6">

}

  const { data } = await db.from('users').select('*').eq('username', username).eq('password', password).single();

  const { data } = await db.from('users').insert({ username, password, joined_rooms: rooms }).select().single();

    joinedRooms = rooms;
    showMainApp();
  } else showToast('注册失败');
}

function validateCredentials(username, password) {
  const alphanumericRegex = /^[a-zA-Z0-9]+$/;
  if (!username || !password) return { valid: false, message: '请填写完整信息' };
  if (!alphanumericRegex.test(username)) return { valid: false, message: '用户名只能包含英文和数字' };
  if (username.length < 3) return { valid: false, message: '用户名至少3个字符' };
  if (!alphanumericRegex.test(password)) return { valid: false, message: '密码只能包含英文和数字' };
  if (password.length < 4) return { valid: false, message: '密码至少4个字符' };
  return { valid: true };
}

}

    if (hasNews) {
      newsHtml = `<div class="news-preview-list ${expandedNews[room.id] ? 'expanded' : ''} mt-3 space-y-2">
        ${hasNews.slice(0,3).map(n => `<div class="news-card"><div class="flex items-start gap-2">${n.hot ? '<span class="text-xs px-1 py-0.5 bg-red-100 text-red-600 rounded font-medium">热</span>' : ''}<div class="flex-1"><div class="text-sm font-medium text-slate-800 truncate">${n.title}</div><div class="text-xs text-slate-500">${n.time}</div></div></div></div>`).join('')}
        <button onclick="event.stopPropagation(); openNewsModal('${room.id}')" class="w-full text-center text-sm text-indigo-600 font-medium py-2 hover:text-indigo-700">查看更多 →</button>
      </div>`;
    }

    return `<div class="mb-2">
      <div class="room-item ${isJoined ? 'joined' : ''} ${isActive ? 'active' : ''}" onclick="handleRoomClick('${room.id}', ${isJoined})">
        <div class="room-icon ${isActive && isJoined ? 'bg-white/30' : colorMap[room.color]}"><span class="text-xl">${room.emoji}</span></div>
        <div class="room-info"><div class="font-medium text-sm room-name truncate flex items-center gap-2">${room.name} <span class="text-xs opacity-70">${achievement.icon}</span></div><div class="text-xs room-online">${stats.users}人 · ${achievement.name}</div></div>
        <div class="room-actions">${hasNews ? `<span class="news-badge" onclick="event.stopPropagation(); toggleNewsPreview('${room.id}')">资讯</span>` : ''}${actionsHtml}</div>
        ${idx < 3 ? `<span class="rank-crown">${idx === 0 ? '🥇' : idx === 1 ? '🥈' : '🥉'}</span>` : ''}
      </div>
      ${newsHtml}
    </div>`;
  }).join('');
}

function toggleNewsPreview(roomId) { expandedNews[roomId] = !expandedNews[roomId]; renderAllRooms(); }

function openNewsModal(roomId) {
  const room = roomTypes.find(r => r.id === roomId);
  const news = newsData[roomId];
  if (!room || !news) return;
  const modal = document.getElementById('newsModal');
  document.getElementById('newsModalIcon').innerHTML = `<span class="text-xl">${room.emoji}</span>`;
  document.getElementById('newsModalTitle').textContent = `${room.name} · 每日资讯`;
  document.getElementById('newsModalSubtitle').textContent = `${news.length}条热点`;
  document.getElementById('newsModalContent').innerHTML = news.map(item => `<div class="p-4 rounded-xl bg-slate-50 border"><div class="flex items-center gap-2 mb-2">${item.hot ? '<span class="text-xs px-2 py-0.5 bg-red-100 text-red-600 rounded font-semibold">热门</span>' : ''}<span class="text-xs text-slate-400">${item.time}</span></div><h4 class="font-semibold mb-1">${item.title}</h4><p class="text-sm text-slate-600">${item.summary}</p></div>`).join('');
  modal.classList.remove('hidden'); modal.classList.add('flex');
}

function closeNewsModal() { document.getElementById('newsModal').classList.add('hidden'); document.getElementById('newsModal').classList.remove('flex'); }

function handleRoomClick(roomId, isJoined) { if (isJoined) switchRoom(roomId); else joinRoom(roomId); }

async function exitRoom(roomId) {
  if (roomId === 'world') { showToast('世界聊天室无法退出'); return; }
  const index = joinedRooms.indexOf(roomId);
  if (index > -1) {
    joinedRooms.splice(index, 1);
    await db.from('users').update({ joined_rooms: joinedRooms }).eq('id', currentUser.id);
    currentUser.joined_rooms = joinedRooms;
    localStorage.setItem('fishUser', JSON.stringify(currentUser));
    if (currentRoom === roomId) switchRoom('world');
    else { renderAllRooms(); renderRoomTags(); updateJoinedCount(); }
    showToast('已退出聊天室');
  }
}

async function joinRoom(roomId) {
  if (roomId === 'world') { showToast('世界聊天室已自动加入'); return; }
  if (joinedRooms.filter(r => r !== 'world').length >= 3) { showToast('最多只能加入3个额外聊天室'); return; }
  if (!joinedRooms.includes(roomId)) {
    joinedRooms.push(roomId);
    await db.from('users').update({ joined_rooms: joinedRooms }).eq('id', currentUser.id);
    currentUser.joined_rooms = joinedRooms;
    localStorage.setItem('fishUser', JSON.stringify(currentUser));
    renderAllRooms(); renderRoomTags(); updateJoinedCount();
    switchRoom(roomId);
    showToast('成功加入聊天室！');
  }
}

function renderRoomTags() {
  document.getElementById('roomTags').innerHTML = joinedRooms.map(roomId => {
    const room = roomTypes.find(r => r.id === roomId);
    return room ? `<div class="room-tag ${currentRoom === roomId ? 'active' : ''}" onclick="switchRoom('${roomId}')"><span>${room.emoji}</span>${room.name}</div>` : '';
  }).join('');
}

async function switchRoom(id) {
  currentRoom = id;
  const room = roomTypes.find(r => r.id === id);
  if (room) {
    document.getElementById('currentRoomName').textContent = room.name;
    document.getElementById('currentRoomDesc').textContent = room.desc;
    document.getElementById('currentRoomIcon').innerHTML = `<span class="text-xl">${room.emoji}</span>`;
    const colorMap = { emerald: 'bg-emerald-100', pink: 'bg-pink-100', blue: 'bg-blue-100', purple: 'bg-purple-100', orange: 'bg-orange-100', cyan: 'bg-cyan-100', red: 'bg-red-100' };
    document.getElementById('currentRoomIcon').className = `room-icon ${colorMap[room.color]}`;
  }
  renderAllRooms(); renderRoomTags(); renderMembers(); updateRoomStats();
  await loadMessages(); subscribeMessages();
}

async function loadMessages() {
  const { data: messages } = await db.from('messages').select('*').eq('room_id', currentRoom).order('created_at', { ascending: true }).limit(100);
  const container = document.getElementById('messageList');
  container.innerHTML = '';
  if (messages && messages.length > 0) messages.forEach(msg => appendMessage(msg, false));
  else container.innerHTML = '<div class="flex flex-col items-center justify-center h-full text-slate-400"><p>暂无消息</p></div>';
  container.scrollTop = container.scrollHeight;
}

function subscribeMessages() {
  if (msgChannel) db.removeChannel(msgChannel);
  msgChannel = db.channel('m_' + currentRoom)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${currentRoom}` }, payload => appendMessage(payload.new, true))
    .subscribe();
}

function appendMessage(msg, scroll = true) {
  const container = document.getElementById('messageList');
  const isSelf = msg.username === currentUser?.username;
  const time = new Date(msg.created_at).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  const data = memberNamesData[currentRoom] || memberNamesData.world;
  const avatar = data.avatars[Math.floor(Math.random() * data.avatars.length)];
  const avatarClass = data.avatarClasses[Math.floor(Math.random() * data.avatarClasses.length)];
  
  if (container.querySelector('p')) container.innerHTML = '';
  
  const msgHtml = `<div class="message flex items-start gap-3 ${isSelf ? 'flex-row-reverse' : ''}">
    <div class="w-10 h-10 rounded-full ${isSelf ? 'bg-gradient-to-br from-emerald-400 to-teal-500' : avatarClass} flex items-center justify-center text-lg flex-shrink-0">${isSelf ? currentUser.username[0].toUpperCase() : avatar}</div>
    <div class="${isSelf ? 'text-right' : ''}"><div class="flex items-center gap-2 mb-1 ${isSelf ? 'justify-end' : ''}"><span class="font-medium text-slate-800">${msg.username}</span><span class="text-xs text-slate-400">${time}</span></div><div class="${isSelf ? 'message-self' : 'message-other'} px-4 py-2 max-w-xs inline-block">${escapeHtml(msg.content)}</div></div>
  </div>`;
  
  container.insertAdjacentHTML('beforeend', msgHtml);
  if (scroll) container.scrollTop = container.scrollHeight;
}

function escapeHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function sendMessage() {
  const input = document.getElementById('messageInput');
  const content = input.value.trim();
  if (!content) return;
  if (containsSensitiveWords(content)) { showToast('请文明发言'); return; }
  totalWords += content.length;
  input.value = '';
  await db.from('messages').insert({ room_id: currentRoom, user_id: currentUser.id, username: currentUser.username, content });
}

function containsSensitiveWords(text) { return sensitiveWords.some(word => text.toLowerCase().includes(word)); }

function renderMembers() {
  const data = memberNamesData[currentRoom] || memberNamesData.world;
  const members = [];
  for (let i = 0; i < 8; i++) {
    members.push({
      name: data.names[i % data.names.length],
      status: Math.random() > 0.2 ? '在线' : '离开',
      avatar: data.avatars[i % data.avatars.length],
      avatarClass: data.avatarClasses[i % data.avatarClasses.length]
    });
  }
  document.getElementById('memberCount').textContent = `${members.filter(m => m.status === '在线').length}人`;
  document.getElementById('memberListContent').innerHTML = members.map((m, i) => `<div class="member-item flex items-center gap-3 p-2 rounded-lg hover:bg-slate-50" style="animation-delay: ${i * 50}ms"><div class="member-avatar ${m.avatarClass}">${m.avatar}</div><div class="flex-1"><div class="font-medium text-slate-700 text-sm">${m.name}</div><div class="text-xs ${m.status === '在线' ? 'text-emerald-500' : 'text-slate-400'}">${m.status}</div></div>${m.status === '在线' ? '<div class="online-dot"></div>' : ''}</div>`).join('');
}

function updateJoinedCount() { document.getElementById('joinedCount').textContent = joinedRooms.filter(r => r !== 'world').length; }
function handleKeyDown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
function toggleMemberList() { document.getElementById('memberList').classList.toggle('hidden'); }
function showToast(msg) { document.getElementById('toastMessage').textContent = msg; document.getElementById('warningToast').classList.remove('hidden'); setTimeout(() => document.getElementById('warningToast').classList.add('hidden'), 3000); }

// 个人中心
function openProfile() {
  const modal = document.getElementById('profileModal'); modal.classList.remove('hidden'); modal.classList.add('flex');
  document.getElementById('profileAvatar').textContent = currentUser.username[0].toUpperCase();
  document.getElementById('profileName').textContent = currentUser.username;
  document.getElementById('statWords').textContent = totalWords;
  document.getElementById('statTime').textContent = onlineTime;
  document.getElementById('statDays').textContent = getConsecutiveDays();
  renderCheckinCalendar();
  const today = new Date().toDateString();
  const btn = document.getElementById('checkinBtn');
  if (checkinDays.includes(today)) { btn.textContent = '已签到'; btn.disabled = true; btn.classList.add('opacity-50'); }
}
function closeProfile() { document.getElementById('profileModal').classList.add('hidden'); document.getElementById('profileModal').classList.remove('flex'); }
function getConsecutiveDays() { let c = 0; const t = new Date(); for (let i = 0; i < 30; i++) { const d = new Date(t); d.setDate(t.getDate() - i); if (checkinDays.includes(d.toDateString())) c++; else break; } return c; }
async function doCheckin() {
  const today = new Date().toDateString();
  if (!checkinDays.includes(today)) {
    checkinDays.push(today);
    await db.from('users').update({ checkin_days: checkinDays }).eq('id', currentUser.id);
    document.getElementById('checkinBtn').textContent = '已签到'; document.getElementById('checkinBtn').disabled = true; document.getElementById('checkinBtn').classList.add('opacity-50');
    document.getElementById('statDays').textContent = getConsecutiveDays();
    renderCheckinCalendar();
    showToast('签到成功！');
  }
}
function renderCheckinCalendar() {
  const container = document.getElementById('checkinCalendar');
  const today = new Date();
  const days = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
  container.innerHTML = Array.from({ length: days }, (_, i) => {
    const d = new Date(today.getFullYear(), today.getMonth(), i + 1);
    const checked = checkinDays.includes(d.toDateString());
    return `<div class="checkin-day ${checked ? 'checked' : ''} ${i + 1 === today.getDate() ? 'today' : ''}">${i + 1}</div>`;
  }).join('');
}

init();
</script>
