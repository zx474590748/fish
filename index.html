<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FISH - 世界聊天室</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-start: #f0fdfa;
      --bg-end: #fef3c7;
      --fg: #1e293b;
      --muted: #64748b;
      --accent: #10b981;
      --accent-light: #d1fae5;
      --secondary: #f472b6;
      --card: #ffffff;
      --border: #e2e8f0;
    }
    * { font-family: 'Noto Sans SC', 'Quicksand', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%); min-height: 100vh; color: var(--fg); overflow: hidden; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #059669); color: white; border-radius: 12px; font-weight: 600; transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(16,185,129,0.3); border: none; cursor: pointer; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(16,185,129,0.4); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-secondary { background: var(--accent-light); color: var(--accent); border-radius: 12px; font-weight: 600; transition: all 0.2s ease; border: none; cursor: pointer; }
    .btn-secondary:hover { background: #a7f3d0; }
    .input-field { background: #f8fafc; border: 2px solid var(--border); border-radius: 12px; transition: all 0.2s ease; width: 100%; outline: none; }
    .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
    .room-tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; transition: all 0.2s ease; cursor: pointer; }
    .room-tag.active { background: var(--accent); color: white; }
    .room-tag:not(.active) { background: var(--accent-light); color: var(--accent); }
    .message { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .message-self { background: linear-gradient(135deg, var(--accent), #059669); color: white; border-radius: 18px 18px 4px 18px; }
    .message-other { background: #f1f5f9; border-radius: 18px 18px 18px 4px; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
    .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    .modal-content { animation: modalIn 0.3s ease; }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; display: inline-block; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .room-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
    .room-item.joined { background: #ecfdf5; border: 1px solid #a7f3d0; }
    .room-item.active { background: linear-gradient(135deg, var(--accent), #059669); color: white; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
    .room-item:not(.joined) { background: #f8fafc; border: 1px dashed #e2e8f0; }
    .room-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: #e2e8f0; }
    .room-item.active .room-icon { background: rgba(255,255,255,0.2); }
    .achievement-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .achievement-1 { background: #e0f2fe; color: #0369a1; }
    .achievement-2 { background: #dcfce7; color: #15803d; }
    .achievement-3 { background: #fef3c7; color: #b45309; }
    .achievement-4 { background: #fce7f3; color: #be185d; }
    .achievement-5 { background: #e0e7ff; color: #4338ca; }
    .member-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; color: white; }
    .avatar-world-1 { background: linear-gradient(135deg, #f472b6, #ec4899); }
    .avatar-world-2 { background: linear-gradient(135deg, #a78bfa, #8b5cf6); }
    .avatar-pet-1 { background: linear-gradient(135deg, #fda4af, #fb7185); }
    .avatar-game-1 { background: linear-gradient(135deg, #e879f9, #d946ef); }
    .avatar-travel-1 { background: linear-gradient(135deg, #67e8f9, #22d3ee); }
    .avatar-car-1 { background: linear-gradient(135deg, #94a3b8, #64748b); }
    .avatar-ai-1 { background: linear-gradient(135deg, #818cf8, #6366f1); }
    .avatar-food-1 { background: linear-gradient(135deg, #fdba74, #fb923c); }
    .emoji-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .loading-spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
    
    /* 移动端优化 */
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 280px; z-index: 60; transform: translateX(-100%); transition: transform 0.3s ease; box-shadow: none; border-radius: 0; border-right: 1px solid var(--border); }
      .sidebar.open { transform: translateX(0); box-shadow: 20px 0 40px rgba(0,0,0,0.2); }
      .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 55; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
      .sidebar-overlay.open { opacity: 1; pointer-events: auto; }
      .right-panel { position: fixed; right: 0; top: 0; height: 100vh; width: 300px; z-index: 60; transform: translateX(100%); transition: transform 0.3s ease; }
      .right-panel.open { transform: translateX(0); box-shadow: -20px 0 40px rgba(0,0,0,0.2); }
      .mobile-nav { display: flex !important; }
      .chat-header-actions { display: flex !important; }
    }
    @media (min-width: 769px) {
      .sidebar { position: relative; transform: none; }
      .sidebar-overlay { display: none; }
      .mobile-nav { display: none !important; }
      .chat-header-actions { display: none !important; }
    }

    /* 五子棋样式 */
    .game-board { display: grid; grid-template-columns: repeat(15, 1fr); gap: 0; background: #dcb35c; padding: 4px; border-radius: 8px; user-select: none; }
    .game-cell { width: 20px; height: 20px; position: relative; cursor: pointer; }
    .game-cell::before, .game-cell::after { content: ''; position: absolute; background: #b8860b; }
    .game-cell::before { left: 50%; top: 0; bottom: 0; width: 1px; }
    .game-cell::after { top: 50%; left: 0; right: 0; height: 1px; }
    .game-piece { position: absolute; inset: 2px; border-radius: 50%; z-index: 1; box-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
    .game-piece.black { background: radial-gradient(circle at 30% 30%, #555, #000); }
    .game-piece.white { background: radial-gradient(circle at 30% 30%, #fff, #ddd); }
    .game-piece.last::after { content: ''; position: absolute; inset: 6px; border-radius: 50%; border: 2px solid red; }
  </style>
</head>
<body class="overflow-hidden">
  <!-- 背景装饰 -->
  <div class="fixed inset-0 pointer-events-none z-0">
    <div class="absolute rounded-full w-80 h-80 top-[-100px] right-[-100px] bg-gradient-to-br from-emerald-100 to-pink-100 opacity-30"></div>
    <div class="absolute rounded-full w-60 h-60 bottom-10 left-[-50px] bg-gradient-to-br from-blue-100 to-purple-100 opacity-30"></div>
  </div>

  <!-- 移动端侧边栏遮罩 -->
  <div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- 登录/注册模态框 -->
  <div id="authModal" class="fixed inset-0 z-50 flex items-center justify-center modal-overlay">
    <div class="modal-content card p-8 w-full max-w-md mx-4 relative">
      <div class="text-center mb-6">
        <div class="inline-flex items-center gap-2 mb-1">
          <svg class="w-8 h-8 text-emerald-500" viewBox="0 0 40 40" fill="none"><ellipse cx="16" cy="20" rx="12" ry="8" fill="currentColor"/><path d="M28 20 L38 14 L38 26 Z" fill="currentColor"/><circle cx="12" cy="18" r="2" fill="white"/></svg>
          <span class="text-2xl font-bold text-emerald-600">FISH</span>
        </div>
        <p class="text-slate-500 text-sm">世界聊天室</p>
      </div>

      <div id="loginForm">
        <div class="space-y-3">
          <input type="text" id="loginUsername" class="input-field px-4 py-3" placeholder="用户名 (英文+数字)">
          <input type="password" id="loginPassword" class="input-field px-4 py-3" placeholder="密码">
        </div>
        <button onclick="handleLogin()" id="loginBtn" class="btn-primary w-full py-3 mt-4 flex justify-center">登录</button>
        <p class="text-center text-slate-500 text-sm mt-4">没有账号？<button onclick="showRegister()" class="text-emerald-600 font-semibold">注册</button></p>
      </div>

      <div id="registerForm" class="hidden">
        <div class="space-y-3">
          <input type="text" id="regUsername" class="input-field px-4 py-3" placeholder="用户名 (3-16位英文数字)">
          <input type="password" id="regPassword" class="input-field px-4 py-3" placeholder="密码 (4-20位)">
          <div>
            <label class="text-xs text-slate-500 mb-2 block">兴趣房间 (可选)</label>
            <div class="grid grid-cols-3 gap-2" id="roomTypeSelector">
              <div class="p-2 border rounded-lg text-center text-xs cursor-pointer hover:border-emerald-400" data-id="pet" onclick="toggleRoomType(this)">🐾 宠物</div>
              <div class="p-2 border rounded-lg text-center text-xs cursor-pointer hover:border-emerald-400" data-id="travel" onclick="toggleRoomType(this)">🏔️ 景点</div>
              <div class="p-2 border rounded-lg text-center text-xs cursor-pointer hover:border-emerald-400" data-id="game" onclick="toggleRoomType(this)">🎮 游戏</div>
              <div class="p-2 border rounded-lg text-center text-xs cursor-pointer hover:border-emerald-400" data-id="car" onclick="toggleRoomType(this)">🚗 汽车</div>
              <div class="p-2 border rounded-lg text-center text-xs cursor-pointer hover:border-emerald-400" data-id="ai" onclick="toggleRoomType(this)">🤖 AI</div>
              <div class="p-2 border rounded-lg text-center text-xs cursor-pointer hover:border-emerald-400" data-id="food" onclick="toggleRoomType(this)">🍜 美食</div>
            </div>
          </div>
        </div>
        <button onclick="handleRegister()" id="registerBtn" class="btn-primary w-full py-3 mt-4 flex justify-center">注册</button>
        <p class="text-center text-slate-500 text-sm mt-4">已有账号？<button onclick="showLogin()" class="text-emerald-600 font-semibold">登录</button></p>
      </div>
    </div>
  </div>

  <!-- 主界面 -->
  <div id="mainApp" class="hidden h-screen flex flex-col relative z-10">
    <!-- 顶部栏 (移动端优化) -->
    <header class="card mx-2 mt-2 md:mx-4 md:mt-4 px-3 py-2 md:px-6 md:py-3 flex items-center justify-between border-b">
      <div class="flex items-center gap-2">
        <!-- 移动端菜单按钮 -->
        <button onclick="openSidebar()" class="mobile-nav p-2 -ml-2 hover:bg-slate-100 rounded-lg">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <svg class="w-6 h-6 md:w-8 md:h-8 text-emerald-500" viewBox="0 0 40 40" fill="none"><ellipse cx="16" cy="20" rx="12" ry="8" fill="currentColor"/><path d="M28 20 L38 14 L38 26 Z" fill="currentColor"/><circle cx="12" cy="18" r="2" fill="white"/></svg>
        <span class="font-bold text-emerald-600 text-lg md:text-xl">FISH</span>
      </div>
      
      <div class="flex items-center gap-2 md:gap-4">
        <!-- 移动端：右侧面板按钮 -->
        <button onclick="openRightPanel()" class="chat-header-actions p-2 hover:bg-slate-100 rounded-lg" title="统计/成员">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
        </button>
        
        <div class="flex items-center gap-1 text-xs md:text-sm"><div class="online-dot"></div><span id="onlineCount">-- 在线</span></div>
        <button onclick="openProfile()" class="flex items-center gap-1 px-2 py-1 rounded-lg hover:bg-slate-50">
          <div id="userAvatar" class="w-7 h-7 md:w-8 md:h-8 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center text-white text-xs font-bold"></div>
          <span id="userName" class="font-medium text-sm hidden md:block"></span>
        </button>
      </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
      <!-- 左侧：房间列表 -->
      <aside id="sidebar" class="sidebar card w-72 flex-shrink-0 flex flex-col md:m-2 md:mr-0 z-60">
        <div class="p-3 border-b flex justify-between items-center">
          <div>
            <h3 class="font-semibold text-sm">聊天室</h3>
            <p class="text-xs text-slate-400">已加入 <span id="joinedCount">1</span>/4</p>
          </div>
          <button onclick="closeSidebar()" class="mobile-nav p-1 hover:bg-slate-100 rounded md:hidden">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="flex-1 overflow-y-auto p-2 space-y-1" id="roomList"></div>
      </aside>

      <!-- 中间：聊天区 -->
      <main class="flex-1 flex flex-col overflow-hidden md:m-2 card">
        <div class="px-3 py-2 border-b flex items-center gap-2">
          <div id="currentRoomIcon" class="room-icon bg-slate-100"><span class="text-base">🌐</span></div>
          <div class="flex-1 min-w-0">
            <h2 id="roomTitle" class="font-semibold text-sm truncate">世界聊天室</h2>
            <p id="roomDesc" class="text-xs text-slate-400 truncate">和全世界畅聊</p>
          </div>
          <!-- 游戏按钮 -->
          <button onclick="openGame()" class="p-2 hover:bg-slate-100 rounded-lg text-lg" title="小游戏">♟️</button>
        </div>
        
        <div id="messageList" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
        
        <div class="p-2 border-t flex items-end gap-1">
          <button onclick="toggleEmoji()" class="p-2 text-lg">😊</button>
          <div id="emojiBox" class="hidden absolute bottom-14 left-2 card p-2 shadow-xl z-20 emoji-grid w-56 h-40 overflow-y-auto"></div>
          <textarea id="msgInput" class="input-field flex-1 px-3 py-2 text-sm resize-none" rows="1" placeholder="说点什么..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
          <button onclick="send()" class="btn-primary px-3 py-2 text-sm">发送</button>
        </div>
      </main>

      <!-- 右侧：统计/成员 (移动端为滑出面板) -->
      <aside id="rightPanel" class="right-panel card w-64 flex-shrink-0 flex flex-col md:m-2 md:ml-0 z-60 overflow-hidden">
        <div class="p-3 border-b flex justify-between items-center">
          <h3 class="font-semibold text-sm">摸鱼统计</h3>
          <button onclick="closeRightPanel()" class="mobile-nav p-1 hover:bg-slate-100 rounded md:hidden">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        
        <!-- 摸鱼累计模版 -->
        <div class="p-3 bg-gradient-to-br from-emerald-50 to-teal-50 border-b">
          <div class="flex items-center justify-between mb-2">
            <span class="text-xs text-slate-500">累计摸鱼</span>
            <div id="achievementBadge" class="achievement-badge achievement-1"><span id="achIcon">🐠</span></div>
          </div>
          <div class="text-center mb-2">
            <span id="statTotalTime" class="text-3xl font-bold text-emerald-600">0</span>
            <span class="text-sm text-slate-400">分钟</span>
          </div>
          <div class="space-y-1">
            <div class="flex justify-between text-xs"><span>下一等级</span><span id="nextLevel">500分钟</span></div>
            <div class="h-2 bg-white rounded-full overflow-hidden">
              <div id="progressBar" class="h-full bg-emerald-400 transition-all" style="width:0%"></div>
            </div>
          </div>
        </div>

        <div class="p-3 border-b flex justify-between items-center">
          <h4 class="font-semibold text-sm">在线成员</h4>
          <span id="memberCount" class="text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full">0</span>
        </div>
        <div class="flex-1 overflow-y-auto p-2 space-y-1" id="memberList"></div>
      </aside>
    </div>
    
    <!-- 移动端底部导航 -->
    <nav class="mobile-nav fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-2 z-40 md:hidden">
      <button onclick="openSidebar()" class="flex flex-col items-center text-xs text-slate-600"><svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>房间</button>
      <button onclick="openFeedback()" class="flex flex-col items-center text-xs text-slate-600"><svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>反馈</button>
      <button onclick="openProfile()" class="flex flex-col items-center text-xs text-slate-600"><svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>我的</button>
    </nav>
  </div>

  <!-- 个人中心 -->
  <div id="profileModal" class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay">
    <div class="card p-6 w-80 mx-4 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4"><h3 class="font-semibold">个人中心</h3><button onclick="closeProfile()" class="text-xl text-slate-300 hover:text-slate-500">&times;</button></div>
      <div class="text-center mb-4">
        <div id="profileAvatar" class="w-16 h-16 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center text-white text-2xl font-bold mx-auto mb-1"></div>
        <div id="profileName" class="font-semibold"></div>
      </div>
      <div class="bg-emerald-50 rounded-xl p-3 mb-4 text-sm grid grid-cols-3 text-center">
        <div><div class="font-bold text-emerald-600" id="pWords">0</div><div class="text-slate-400 text-xs">字数</div></div>
        <div><div class="font-bold text-pink-500" id="pTime">0</div><div class="text-slate-400 text-xs">分钟</div></div>
        <div><div class="font-bold text-amber-500" id="pDays">0</div><div class="text-slate-400 text-xs">签到</div></div>
      </div>
      <div class="mb-4">
        <div class="flex justify-between items-center mb-2"><span class="text-sm font-medium">打卡日历</span><button onclick="checkin()" id="checkinBtn" class="btn-secondary text-xs px-3 py-1">签到</button></div>
        <div id="calendar" class="grid grid-cols-7 gap-1"></div>
      </div>
      <button onclick="logout()" class="w-full py-2 text-red-500 hover:bg-red-50 rounded-lg text-sm">退出登录</button>
    </div>
  </div>

  <!-- 意见反馈模态框 -->
  <div id="feedbackModal" class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay">
    <div class="card p-6 w-80 mx-4">
      <div class="flex justify-between items-center mb-4"><h3 class="font-semibold">意见反馈</h3><button onclick="closeFeedback()" class="text-xl text-slate-300 hover:text-slate-500">&times;</button></div>
      <div class="space-y-3">
        <select id="feedbackType" class="input-field px-3 py-2 text-sm">
          <option value="bug">问题反馈</option>
          <option value="suggestion">功能建议</option>
          <option value="other">其他</option>
        </select>
        <textarea id="feedbackContent" class="input-field px-3 py-2 text-sm h-24 resize-none" placeholder="请描述您的问题或建议..."></textarea>
        <button onclick="submitFeedback()" id="feedbackBtn" class="btn-primary w-full py-2 text-sm">提交反馈</button>
      </div>
    </div>
  </div>

  <!-- 五子棋模态框 -->
  <div id="gameModal" class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay">
    <div class="card p-4 w-full max-w-sm mx-4">
      <div class="flex justify-between items-center mb-3">
        <h3 class="font-semibold">五子棋</h3>

          <span id="gameStatus" class="text-xs bg-slate-100 px-2 py-1 rounded">黑棋回合</span>

        </div>

      <div id="gameBoard" class="game-board mx-auto" style="width: 308px;"></div>
      <div class="flex justify-center gap-2 mt-3">
        <button onclick="resetGame()" class="btn-secondary text-xs px-4 py-1.5">重新开始</button>
        <button onclick="closeGame()" class="btn-primary text-xs px-4 py-1.5">关闭</button>

<script>
// ============================================================
// 配置 Supabase
// ============================================================
const SUPABASE_URL = 'https://xgsmfikhstlxingnzcdf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhnc21maWtoc3RseGluZ256Y2RmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTI4NzYsImV4cCI6MjA4ODI2ODg3Nn0.gghyf7F7Wqspd3GzkSQb1DCY_yW5Vq8lmiIWDnR9TPE';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================================================
// 状态与数据
// ============================================================
let currentUser = null, currentRoom = 'world', joinedRooms = ['world'], selectedRooms = [];
let totalWords = 0, onlineTime = 0, checkinDays = [];
let msgChannel = null;
let displayName = '', displayAvatar = '', displayAvatarClass = '';
let gameBoard = [], currentPlayer = 1, gameOver = false; // 1=黑, 2=白

const rooms = [
  { id: 'world', name: '世界', emoji: '🌐', desc: '和全世界畅聊' },
  { id: 'pet', name: '宠物', emoji: '🐾', desc: '萌宠日常' },
  { id: 'game', name: '游戏', emoji: '🎮', desc: '组队开黑' },
  { id: 'ai', name: 'AI', emoji: '🤖', desc: 'AI探讨' },
  { id: 'food', name: '美食', emoji: '🍜', desc: '吃货天堂' }
];
const achievements = [
  { name: '小鱼', icon: '🐠', mins: 0 },
  { name: '大鱼', icon: '🐟', mins: 500 },
  { name: '海豚', icon: '🐬', mins: 1000 },
  { name: '鲨鱼', icon: '🦈', mins: 1500 },
  { name: '鲸鱼', icon: '🐋', mins: 2000 }
];
const emojis = ['😀','😂','🤣','😊','😍','🥰','😘','😜','🤪','😝','🤑','🤗','🤭','🤫','🤔','🤐','🤨','😐','😑','😶','😏','😒','🙄','😬','🤥','😔','😪','🤤','😴','😷','🤒','🤕','🤢','🤮','🤧','🥵','🥶','🥴','😵','🤯','🤠','🥳','😎','🤓','🧐','👍','👎','👏','🙌','👐','🤲','🤝','🙏','💪','❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❣️','💕','💞','💓','💗','💖','💘','💝'];
const memberData = {
  world: { names: ['James','Emma','田中','Pierre','Hans','小明'], avatars: ['🌏','🌎','🌍','👨','👩','🧑'], classes: ['avatar-world-1','avatar-world-2'] },
  pet: { names: ['哈士奇','柯基','布偶猫','橘猫','仓鼠'], avatars: ['🐕','🐶','🐈','😺','🐹'], classes: ['avatar-pet-1'] },
  game: { names: ['刺客','法师','坦克','欧皇'], avatars: ['🎮','🕹️','👾','🧙'], classes: ['avatar-game-1'] },
  ai: { names: ['ChatGPT','Claude','算法'], avatars: ['🤖','🧠','💻'], classes: ['avatar-ai-1'] },
  food: { names: ['火锅','奶茶','吃货'], avatars: ['🍜','🧋','🍣'], classes: ['avatar-food-1'] }
};

// ============================================================
// 初始化
// ============================================================
async function init() {
  const saved = localStorage.getItem('fish_user');
  if (saved) {
    const u = JSON.parse(saved);
    const { data } = await db.from('users').select('*').eq('id', u.id).single();
    if (data) {
      currentUser = data;
      joinedRooms = data.joined_rooms || ['world'];
      totalWords = data.total_words || 0;
      onlineTime = data.online_time || 0;
      checkinDays = data.checkin_days || [];
      await db.from('users').update({ is_online: true, last_seen: new Date().toISOString() }).eq('id', currentUser.id);
      showMain();
      return;
    }
  }
  document.getElementById('authModal').classList.remove('hidden');
  document.getElementById('authModal').classList.add('flex');
}

// ============================================================
// 登录注册
// ============================================================
function showLogin() { document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('registerForm').classList.add('hidden'); }
function showRegister() { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); }
function toggleRoomType(el) { if(el.classList.contains('bg-emerald-100')) { el.classList.remove('bg-emerald-100','border-emerald-400'); selectedRooms = selectedRooms.filter(i=>i!==el.dataset.id); } else { if(selectedRooms.length<3){ el.classList.add('bg-emerald-100','border-emerald-400'); selectedRooms.push(el.dataset.id); } else toast('最多3个'); } }

async function handleLogin() {
  const u = document.getElementById('loginUsername').value.trim();
  const p = document.getElementById('loginPassword').value;
  if(!/^[a-zA-Z0-9]{3,}$/.test(u) || !/^[a-zA-Z0-9]{4,}$/.test(p)) return toast('格式错误');
  setLoading('loginBtn', true);
  const { data } = await db.from('users').select('*').eq('username', u).eq('password', p).single();
  setLoading('loginBtn', false);
  if (data) { currentUser = data; joinedRooms = data.joined_rooms||['world']; totalWords = data.total_words||0; onlineTime = data.online_time||0; checkinDays = data.checkin_days||[]; localStorage.setItem('fish_user', JSON.stringify(currentUser)); await db.from('users').update({ is_online: true }).eq('id', currentUser.id); showMain(); }
  else toast('账号或密码错误');
}
async function handleRegister() {
  const u = document.getElementById('regUsername').value.trim();
  const p = document.getElementById('regPassword').value;
  if(!/^[a-zA-Z0-9]{3,16}$/.test(u) || !/^[a-zA-Z0-9]{4,20}$/.test(p)) return toast('格式错误');
  setLoading('registerBtn', true);
  const { data: exist } = await db.from('users').select('username').eq('username', u).single();
  if (exist) { setLoading('registerBtn', false); return toast('用户名已存在'); }
  const { data } = await db.from('users').insert({ username: u, password: p, joined_rooms: ['world', ...selectedRooms], is_online: true }).select().single();
  setLoading('registerBtn', false);
  if (data) { currentUser = data; joinedRooms = data.joined_rooms; localStorage.setItem('fish_user', JSON.stringify(currentUser)); showMain(); }
  else toast('注册失败');
}
function setLoading(id, load) { const b = document.getElementById(id); b.disabled = load; b.innerHTML = load ? '<span class="loading-spinner"></span>' : (id === 'loginBtn' ? '登录' : '注册'); }

async function logout() {
  if(currentUser) await db.from('users').update({ is_online: false, online_time: onlineTime, total_words: totalWords }).eq('id', currentUser.id);
  localStorage.removeItem('fish_user');
  location.reload();
}

// ============================================================
// 主界面
// ============================================================
function showMain() {
  document.getElementById('authModal').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('userName').textContent = currentUser.username;
  document.getElementById('userAvatar').textContent = currentUser.username[0].toUpperCase();
  generateProfile(currentRoom);
  renderRooms();
  switchRoom(currentRoom);
  startTimers();
}

function startTimers() {
  setInterval(() => { onlineTime++; updateStats(); if(onlineTime%5===0) db.from('users').update({ online_time: onlineTime }).eq('id', currentUser.id); }, 60000);
  setInterval(() => { if(currentUser) db.from('users').update({ last_seen: new Date().toISOString() }).eq('id', currentUser.id); }, 30000);
}

function generateProfile(roomId) {
  const d = memberData[roomId] || memberData.world;
  displayName = d.names[Math.floor(Math.random()*d.names.length)];
  displayAvatar = d.avatars[Math.floor(Math.random()*d.avatars.length)];
  displayAvatarClass = d.classes[Math.floor(Math.random()*d.classes.length)];
}

function updateStats() {
  let ach = achievements[0];
  for(let i=achievements.length-1; i>=0; i--) if(onlineTime >= achievements[i].mins) { ach = achievements[i]; break; }
  const next = achievements.find(a => a.mins > onlineTime);
  let pct = 100, nxtTxt = '已满级';
  if(next) { pct = Math.floor((onlineTime - ach.mins) / (next.mins - ach.mins) * 100); nxtTxt = next.mins + '分钟'; }
  document.getElementById('statTotalTime').textContent = onlineTime;
  document.getElementById('achIcon').textContent = ach.icon;
  document.getElementById('nextLevel').textContent = nxtTxt;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('achievementBadge').className = 'achievement-badge achievement-' + (achievements.indexOf(ach)+1);
}

function renderRooms() {
  document.getElementById('roomList').innerHTML = rooms.map(r => {
    const j = joinedRooms.includes(r.id);
    const a = currentRoom === r.id;
    return `<div class="room-item ${j?'joined':''} ${a?'active':''}" onclick="handleRoomClick('${r.id}',${j})">
      <div class="room-icon ${a&&j?'bg-white/20':'bg-slate-100'}">${r.emoji}</div>
      <div class="flex-1 min-w-0"><div class="text-sm font-medium truncate">${r.name}</div><div class="text-xs opacity-70 truncate">${r.desc}</div></div>
      ${!j && joinedRooms.length<4 ? '<span class="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded">加入</span>' : ''}
    </div>`;
  }).join('');
  document.getElementById('joinedCount').textContent = joinedRooms.length;
}

function handleRoomClick(id, joined) { if(joined) switchRoom(id); else joinRoom(id); }

async function joinRoom(id) {
  if(joinedRooms.length>=4) return toast('最多加入4个');
  joinedRooms.push(id);
  await db.from('users').update({ joined_rooms: joinedRooms }).eq('id', currentUser.id);
  currentUser.joined_rooms = joinedRooms;
  localStorage.setItem('fish_user', JSON.stringify(currentUser));
  renderRooms(); switchRoom(id); toast('已加入');
}

async function switchRoom(id) {
  currentRoom = id;
  const r = rooms.find(x=>x.id===id);
  document.getElementById('roomTitle').textContent = r.name;
  document.getElementById('roomDesc').textContent = r.desc;
  document.getElementById('currentRoomIcon').innerHTML = `<span class="text-base">${r.emoji}</span>`;
  generateProfile(id);
  renderRooms();
  await loadMsgs();
  subMsgs();
  loadMembers();
}

async function loadMsgs() {
  const { data } = await db.from('messages').select('*').eq('room_id', currentRoom).order('created_at', { ascending: true }).limit(50);
  const el = document.getElementById('messageList');
  el.innerHTML = '';
  if(data && data.length) data.forEach(m => addMsg(m, false));
  else el.innerHTML = '<p class="text-center text-slate-400 py-8 text-sm">暂无消息</p>';
  el.scrollTop = el.scrollHeight;
}

function subMsgs() {
  if(msgChannel) db.removeChannel(msgChannel);
  msgChannel = db.channel('m_'+currentRoom).on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${currentRoom}` }, p => addMsg(p.new, true)).subscribe();
}

function addMsg(m, scroll) {
  const el = document.getElementById('messageList');
  if(el.querySelector('p')) el.innerHTML = '';
  const self = m.username === currentUser?.id;
  const t = new Date(m.created_at).toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
  const cls = m.avatar_class || 'avatar-world-1';
  el.insertAdjacentHTML('beforeend', `<div class="message flex gap-2 ${self?'flex-row-reverse':''}">
    <div class="w-8 h-8 rounded-full ${self?displayAvatarClass:cls} flex items-center justify-center text-sm">${self?displayAvatar:(m.avatar||'👤')}</div>
    <div class="${self?'text-right':''} max-w-[75%]">
      <div class="flex items-center gap-1 text-xs text-slate-400 mb-0.5 ${self?'justify-end':''}">${self?displayName:(m.display_name||m.username)} ${t}</div>
      <div class="${self?'message-self':'message-other'} px-3 py-1.5 text-sm inline-block">${m.content.replace(/</g,'&lt;')}</div>
    </div>
  </div>`);
  if(scroll) el.scrollTop = el.scrollHeight;
}

async function send() {
  const txt = document.getElementById('msgInput').value.trim();
  if(!txt) return;
  document.getElementById('msgInput').value = '';
  totalWords += txt.length;
  await db.from('messages').insert({ room_id: currentRoom, user_id: currentUser.id, username: currentUser.id, display_name: displayName, avatar: displayAvatar, avatar_class: displayAvatarClass, content: txt });
}

async function loadMembers() {
  const ago = new Date(Date.now() - 300000).toISOString();
  const { data } = await db.from('users').select('*').gte('last_seen', ago).eq('is_online', true).limit(15);
  document.getElementById('onlineCount').textContent = (data?.length||0) + ' 在线';
  document.getElementById('memberCount').textContent = data?.length || 0;
  const d = memberData[currentRoom] || memberData.world;
  document.getElementById('memberList').innerHTML = (data||[]).map((u,i) => {
    const isSelf = u.id === currentUser?.id;
    const n = isSelf?displayName:d.names[i%d.names.length];
    const a = isSelf?displayAvatar:d.avatars[i%d.avatars.length];
    const c = isSelf?displayAvatarClass:d.classes[i%d.classes.length];
    return `<div class="flex items-center gap-2 p-1.5 rounded hover:bg-slate-50"><div class="member-avatar ${c}">${a}</div><div class="flex-1 min-w-0"><div class="text-xs font-medium truncate">${n}</div><div class="text-xs text-emerald-500">在线</div></div><div class="online-dot"></div></div>`;
  }).join('');
}

// ============================================================
// UI控制
// ============================================================
function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }
function openRightPanel() { document.getElementById('rightPanel').classList.add('open'); }
function closeRightPanel() { document.getElementById('rightPanel').classList.remove('open'); }

function toggleEmoji() { document.getElementById('emojiBox').classList.toggle('hidden'); if(!document.getElementById('emojiBox').classList.contains('hidden')) document.getElementById('emojiBox').innerHTML = emojis.map(e=>`<div class="emoji-item" onclick="ins('${e}')">${e}</div>`).join(''); }
function ins(e) { const i=document.getElementById('msgInput'); i.value+=e; i.focus(); }

function openProfile() { 
  document.getElementById('profileModal').classList.remove('hidden'); document.getElementById('profileModal').classList.add('flex');
  document.getElementById('profileAvatar').textContent = currentUser.username[0].toUpperCase();
  document.getElementById('profileName').textContent = currentUser.username;
  document.getElementById('pWords').textContent = totalWords;
  document.getElementById('pTime').textContent = onlineTime;
  let c=0; const t=new Date(); for(let i=0;i<30;i++){ const d=new Date(t); d.setDate(t.getDate()-i); if(checkinDays.includes(d.toDateString()))c++;else break; }
  document.getElementById('pDays').textContent = c;
  renderCal();
  if(checkinDays.includes(t.toDateString())){ document.getElementById('checkinBtn').textContent='已签'; document.getElementById('checkinBtn').disabled=true; document.getElementById('checkinBtn').classList.add('opacity-50'); }
}
function closeProfile() { document.getElementById('profileModal').classList.add('hidden'); }
function checkin() {
  const t = new Date().toDateString();
  if(checkinDays.includes(t)) return;
  checkinDays.push(t);
  db.from('users').update({ checkin_days: checkinDays }).eq('id', currentUser.id);
  document.getElementById('checkinBtn').textContent='已签'; document.getElementById('checkinBtn').disabled=true; document.getElementById('checkinBtn').classList.add('opacity-50');
  let c=0; const td=new Date(); for(let i=0;i<30;i++){ const d=new Date(td); d.setDate(td.getDate()-i); if(checkinDays.includes(d.toDateString()))c++;else break; }
  document.getElementById('pDays').textContent = c;
  renderCal();
  toast('签到成功');
}
function renderCal() {
  const t=new Date(), days=new Date(t.getFullYear(), t.getMonth()+1,0).getDate();
  document.getElementById('calendar').innerHTML = Array.from({length:days},(_,i)=>{
    const d=new Date(t.getFullYear(), t.getMonth(), i+1);
    const ck=checkinDays.includes(d.toDateString());
    return `<div class="w-7 h-7 text-xs rounded flex items-center justify-center ${ck?'bg-emerald-500 text-white':(i+1===t.getDate()?'border border-pink-400':'')}">${i+1}</div>`;
  }).join('');
}

// 反馈
function openFeedback() { document.getElementById('feedbackModal').classList.remove('hidden'); document.getElementById('feedbackModal').classList.add('flex'); }
function closeFeedback() { document.getElementById('feedbackModal').classList.add('hidden'); }
async function submitFeedback() {
  const type = document.getElementById('feedbackType').value;
  const content = document.getElementById('feedbackContent').value.trim();
  if(!content) return toast('请输入内容');
  const { error } = await db.from('feedback').insert({ user_id: currentUser?.id, username: currentUser?.username, type, content });
  if(error) toast('提交失败');
  else { toast('感谢反馈'); closeFeedback(); document.getElementById('feedbackContent').value = ''; }
}

// 五子棋
function openGame() { document.getElementById('gameModal').classList.remove('hidden'); document.getElementById('gameModal').classList.add('flex'); resetGame(); }
function closeGame() { document.getElementById('gameModal').classList.add('hidden'); }
function resetGame() {
  gameBoard = Array(15).fill(null).map(() => Array(15).fill(0));
  currentPlayer = 1; gameOver = false;
  document.getElementById('gameStatus').textContent = '黑棋回合';
  document.getElementById('gameStatus').className = 'text-xs bg-slate-800 text-white px-2 py-1 rounded';
  renderBoard();
}
function renderBoard() {
  const el = document.getElementById('gameBoard');
  el.innerHTML = gameBoard.map((row, y) => row.map((cell, x) => 
    `<div class="game-cell" onclick="clickCell(${y},${x})">
      ${cell ? `<div class="game-piece ${cell===1?'black':'white'}"></div>` : ''}
    </div>`
  ).join('')).join('');
}
function clickCell(y, x) {
  if(gameOver || gameBoard[y][x]) return;
  gameBoard[y][x] = currentPlayer;
  renderBoard();
  if(checkWin(y, x)) {
    gameOver = true;
    document.getElementById('gameStatus').textContent = (currentPlayer===1?'黑棋':'白棋') + '获胜!';
    document.getElementById('gameStatus').className = 'text-xs bg-emerald-500 text-white px-2 py-1 rounded';
    return;
  }
  currentPlayer = currentPlayer === 1 ? 2 : 1;
  document.getElementById('gameStatus').textContent = currentPlayer===1?'黑棋回合':'白棋回合';
  document.getElementById('gameStatus').className = 'text-xs ' + (currentPlayer===1?'bg-slate-800 text-white':'bg-white text-slate-800 border') + ' px-2 py-1 rounded';
}
function checkWin(y, x) {
  const p = gameBoard[y][x];
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for(let [dy,dx] of dirs) {
    let c = 1;
    for(let i=1;i<5;i++) { if(gameBoard[y+dy*i]?.[x+dx*i]===p) c++; else break; }
    for(let i=1;i<5;i++) { if(gameBoard[y-dy*i]?.[x-dx*i]===p) c++; else break; }
    if(c>=5) return true;
  }
  return false;
}

function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'), 2000); }

init();
</script>
